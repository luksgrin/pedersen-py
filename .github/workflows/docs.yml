name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (mkdocs + rustdoc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust API docs (rustdoc)
        run: cargo doc --no-deps -p pedersen-kit --all-features

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build docs site
        run: |
          pip install mkdocs-material pymdown-extensions
          mkdocs build
          # Nest rustdoc under /api and redirect /api → the crate index.
          mkdir -p site/api
          cp -r target/doc/. site/api/
          echo '<meta http-equiv="refresh" content="0; url=pedersen_kit/index.html">' > site/api/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
