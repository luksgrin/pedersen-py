name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust — test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy -p pedersen-kit --all-targets -- -D warnings

      - name: Test (default features — includes circom & zcash)
        run: cargo test -p pedersen-kit
      - name: Test (no default features — lean core)
        run: cargo test -p pedersen-kit --no-default-features

  wheel:
    name: Python — maturin build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: maturin build --release -m crates/pedersenpy/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: pedersenpy-wheel
          path: target/wheels/*.whl
